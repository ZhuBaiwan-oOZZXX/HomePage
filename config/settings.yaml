title: HomePage
description: 百万的个人主页
language: zh-Hans
favicon: https://gh-proxy.com/https://raw.githubusercontent.com/ZhuBaiwan-oOZZXX/HomePage/main/icons/baiwan.png

hideVersion: false
disableUpdateCheck: true

# 设置绿点
statusStyle: "dot"
ping: http://127.0.0.1
siteMonitor: http://127.0.0.1

quicklaunch:
  searchDescriptions: true
  hideInternetSearch: false
  showSearchSuggestions: true
  hideVisitURL: false
  # google, duckduckgo, bing, baidu, brave or custom
  provider: google

theme: dark
color: rose
headerStyle: boxed
# 等高卡
useEqualHeights: true

background:
  image: https://gh-proxy.com/https://raw.githubusercontent.com/ZhuBaiwan-oOZZXX/HomePage/main/icons/background/blue.png
  # 不透明度｜可以选择值为 0-100
  opacity: 30
  # blur: sm # 模糊度｜sm（小）｜md（中等）｜xl（大）｜0（无模糊）
  # brightness: 100 # 亮度｜可以选择值为 0｜50｜100
  # saturate: 50 # 饱和度｜可以选择值为 0｜50｜100
  # cardBlur: sm # 为服务和书签卡应用模糊滤镜｜sm（小）｜md（中等）

layout:
  Group 1:
    style: row
    columns: 3
    # 隐藏首页标题
    header: false
    # 等高卡
    useEqualHeights: true
    群组:
      style: row
      columns: 1
      header: false
    🚀百万常用:
      style: row
      columns: 2
      # 等高卡
      useEqualHeights: true
    🌟百万搭建:
      style: row
      columns: 2

  Group 2:
    style: row
    columns: 3
    header: false
    # 等高卡
    useEqualHeights: true
    ☁️开发工具/服务:
      style: row
      columns: 2
    🌈AI 服务:
      style: row
      columns: 2
      # 等高卡
      useEqualHeights: true
    🛠️常用工具:
      style: row
      columns: 2
